<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>three-realtime-rt — ray traced three.js</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0f16; }
    #app { width: 100%; height: 100%; }
    #app canvas { display: block; }
    #boot {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; z-index: 50;
      color: #cfe0ea; font: 14px/1.5 ui-monospace, Consolas, monospace;
      background: radial-gradient(circle at 50% 40%, #16202b, #0a0f16);
      transition: opacity 0.5s; text-align: center; padding: 20px;
    }
    #boot.hidden { opacity: 0; pointer-events: none; }
    #boot .spin {
      width: 34px; height: 34px; border: 3px solid #223240;
      border-top-color: #38d0e0; border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    #boot .err { color: #ff8a80; max-width: 520px; white-space: pre-wrap; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script type="module" crossorigin src="./assets/main-BBNGq22Y.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/Duck-VU-NZJDL.js">
  <link rel="modulepreload" crossorigin href="./assets/OrbitControls-Ch-kMOxI.js">
  <link rel="modulepreload" crossorigin href="./assets/scene-j0tlMD72.js">
</head>
<body>
  <div id="app"></div>
  <div id="boot">
    <div class="spin"></div>
    <div id="boot-msg">loading ray tracer…</div>
  </div>
</body>
</html>
