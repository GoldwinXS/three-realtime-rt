<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>three-realtime-rt demo</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
    #app { width: 100%; height: 100%; }
    #hud {
      position: fixed; top: 10px; left: 10px; z-index: 10;
      font: 12px/1.5 ui-monospace, Consolas, monospace; color: #cfd8dc;
      background: rgba(10, 14, 18, 0.82); border: 1px solid #263238;
      border-radius: 6px; padding: 10px 12px; user-select: none;
    }
    #hud label { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
    #hud select {
      background: #14181c; color: #cfd8dc; border: 1px solid #37474f;
      border-radius: 4px; font: inherit; padding: 1px 4px;
    }
    #stats { margin-top: 6px; color: #78909c; white-space: pre; }
    #title { font-weight: 600; color: #eceff1; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div id="title">three-realtime-rt</div>
    <label><input type="checkbox" id="rtToggle" checked /> ray tracing</label>
    <label><input type="checkbox" id="reprojToggle" checked /> reprojection</label>
    <label><input type="checkbox" id="denoiseToggle" checked /> denoise</label>
    <label><input type="checkbox" id="taaToggle" checked /> TAA (anti-alias)</label>
    <label>lighting res
      <select id="scaleMode">
        <option value="1">100%</option>
        <option value="0.75">75%</option>
        <option value="0.5" selected>50%</option>
      </select>
    </label>
    <label>view
      <select id="viewMode">
        <option value="0" selected>composite</option>
        <option value="1">albedo</option>
        <option value="2">normals</option>
        <option value="3">irradiance</option>
        <option value="4">world pos</option>
        <option value="5">emissive</option>
      </select>
    </label>
    <div id="stats"></div>
  </div>
  <script type="module" src="/examples/main.js"></script>
</body>
</html>
