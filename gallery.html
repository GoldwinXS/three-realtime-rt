<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>three-realtime-rt — premade scene gallery</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0f16; }
    #app { width: 100%; height: 100%; }
    #app canvas { display: block; }
    #boot {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; z-index: 50;
      color: #cfe0ea; font: 14px/1.5 ui-monospace, Consolas, monospace;
      background: radial-gradient(circle at 50% 40%, #16202b, #0a0f16);
      transition: opacity 0.5s; text-align: center; padding: 20px;
    }
    #boot.hidden { opacity: 0; pointer-events: none; }
    #boot .spin {
      width: 34px; height: 34px; border: 3px solid #223240;
      border-top-color: #38d0e0; border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    #boot .err { color: #ff8a80; max-width: 520px; white-space: pre-wrap; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 30;
      display: flex; flex-direction: column; gap: 8px;
      color: #cfe0ea; font: 12px/1.5 ui-monospace, Consolas, monospace;
      background: rgba(14, 18, 24, 0.85); border: 1px solid #26323c;
      border-radius: 8px; padding: 10px 12px; min-width: 220px;
    }
    #hud b { color: #7fd8c8; }
    #hud select, #hud button {
      font: inherit; color: inherit; background: #16202b;
      border: 1px solid #2c3a46; border-radius: 6px; padding: 5px 8px;
      cursor: pointer;
    }
    #hud button.on { border-color: #38d0e0; color: #7fd8c8; }
    #stats { white-space: pre; color: #8fa3b3; }
    #options { border-top: 1px solid #26323c; padding-top: 8px; }
    #options summary {
      cursor: pointer; color: #7fd8c8; list-style: none; user-select: none;
    }
    #options summary::-webkit-details-marker { display: none; }
    #options summary::before { content: "\25B8 "; }
    #options[open] summary::before { content: "\25BE "; }
    #options .opt-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 2px 10px; margin-top: 8px;
    }
    #options label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    #options input[type="checkbox"] { accent-color: #38d0e0; cursor: pointer; }
    #options .opt-res-row { margin-top: 8px; gap: 8px; }
    #options select {
      font: inherit; color: inherit; background: #16202b;
      border: 1px solid #2c3a46; border-radius: 6px; padding: 3px 6px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div><b>three-realtime-rt</b> — premade scenes</div>
    <select id="scene-pick">
      <option value="tokyo">Littlest Tokyo (DRACO glTF)</option>
      <option value="lantern">Lantern (Khronos sample)</option>
      <option value="helmet">Damaged Helmet + props</option>
      <option value="camera">Antique Camera (Khronos sample)</option>
      <option value="boombox">BoomBox (Khronos sample)</option>
      <option value="corset">Corset (Khronos sample)</option>
      <option value="waterbottle">Water Bottle (Khronos sample)</option>
      <option value="toycar">Toy Car (Khronos sample)</option>
      <option value="iridescence">Iridescence Lamp (Khronos sample)</option>
      <option value="mosquito">Mosquito in Amber (Khronos sample)</option>
      <option value="fox">Fox — bind pose (Khronos sample)</option>
    </select>
    <button id="rt-toggle" class="on">ray tracing: ON</button>
    <button id="rt-hold">hold: raster</button>
    <div id="stats"></div>
    <details id="options">
      <summary>options</summary>
      <div class="opt-grid">
        <label><input type="checkbox" data-flag="gi" /> GI</label>
        <label><input type="checkbox" data-flag="emissiveNEE" /> emissive NEE</label>
        <label><input type="checkbox" data-flag="reflections" /> reflections</label>
        <label><input type="checkbox" data-flag="refraction" /> refraction</label>
        <label><input type="checkbox" data-flag="restir" /> ReSTIR</label>
        <label><input type="checkbox" data-flag="denoise" /> denoise</label>
        <label><input type="checkbox" data-flag="taa" /> TAA</label>
        <label><input type="checkbox" data-flag="volumetric" /> volumetric</label>
        <label><input type="checkbox" data-flag="adaptiveQuality" id="opt-adaptive" /> auto quality</label>
      </div>
      <label class="opt-res-row">lighting res
        <select id="opt-res">
          <option value="1">100%</option>
          <option value="0.75">75%</option>
          <option value="0.5">50%</option>
          <option value="0.375">37%</option>
          <option value="0.25">25%</option>
        </select>
      </label>
    </details>
  </div>
  <div id="boot">
    <div class="spin"></div>
    <div id="boot-msg">loading scene…</div>
  </div>
  <script type="module" src="/examples/gallery.js"></script>
</body>
</html>
